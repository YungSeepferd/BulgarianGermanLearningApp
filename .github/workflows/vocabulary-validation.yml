name: Vocabulary Data Validation

on:
  push:
    paths:
      - 'data/**/*.json'
      - 'static/data/**/*.json'
  pull_request:
    paths:
      - 'data/**/*.json'
      - 'static/data/**/*.json'

jobs:
  validate-vocabulary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run vocabulary quality audit
        run: pnpm tsx scripts/audit-vocabulary-quality.ts

      - name: Validate vocabulary schema
        run: pnpm tsx scripts/validate-vocabulary-schema.ts

      - name: Check for grammar completeness
        run: |
          echo "Checking grammar completeness..."
          pnpm tsx scripts/enrich-vocabulary-grammar.ts --dry-run --check-only

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vocabulary-audit-report
          path: docs/vocabulary-audit-report.json
          retention-days: 30